<!-- SOPHIE STARPIZZA - Widget Chat -->
<!-- Incolla questo codice in WordPress: Aspetto > Personalizza > CSS aggiuntivo + Header/Footer plugin -->

<style>
#sophie-bubble {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 56px;
  height: 56px;
  background: #c0392b;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(192,57,43,0.4);
  z-index: 99999;
  transition: transform 0.2s;
}
#sophie-bubble:hover { transform: scale(1.08); }
#sophie-bubble svg { width: 28px; height: 28px; fill: white; }
#sophie-badge {
  position: absolute;
  top: -3px;
  right: -3px;
  width: 18px;
  height: 18px;
  background: #27ae60;
  border-radius: 50%;
  border: 2px solid white;
}
#sophie-window {
  position: fixed;
  bottom: 90px;
  right: 24px;
  width: 370px;
  height: 540px;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  z-index: 99998;
  display: none;
  flex-direction: column;
  border: 1px solid #e0e0e0;
}
#sophie-window.open { display: flex; }
#sophie-window iframe {
  width: 100%;
  height: 100%;
  border: none;
}
@media (max-width: 480px) {
  #sophie-window {
    width: calc(100vw - 20px);
    height: 70vh;
    bottom: 80px;
    right: 10px;
  }
}
</style>

<!-- Pulsante chat -->
<div id="sophie-bubble" onclick="toggleSophie()" title="Chatta con Sophie">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.52 3.66 1.42 5.17L2 22l4.83-1.42A9.96 9.96 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18a8 8 0 01-4.1-1.14l-.29-.18-3.01.88.88-3.01-.18-.29A8 8 0 1112 20z"/>
  </svg>
  <div id="sophie-badge"></div>
</div>

<!-- Finestra chat -->
<div id="sophie-window">
  <iframe
    id="sophie-frame"
    src=""
    title="Sophie - Assistente Starpizza"
    loading="lazy"
  ></iframe>
</div>

<script>
var SOPHIE_URL = 'https://sophie-starpizza-production.up.railway.app';
var sophieOpen = false;
var sophieLoaded = false;

function toggleSophie() {
  sophieOpen = !sophieOpen;
  var win = document.getElementById('sophie-window');
  if (sophieOpen) {
    win.classList.add('open');
    if (!sophieLoaded) {
      document.getElementById('sophie-frame').src = SOPHIE_URL;
      sophieLoaded = true;
    }
  } else {
    win.classList.remove('open');
  }
}
</script>
<!-- FINE SOPHIE STARPIZZA -->
